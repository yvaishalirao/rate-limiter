version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  api:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - RATE_LIMIT_N
      - RATE_LIMIT_WINDOW_S
      - REDIS_URL=redis://redis:6379
      - CB_FAIL_MAX
      - CB_RESET_TIMEOUT
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    deploy:
      replicas: 2

  nginx:
    image: nginx:alpine
    ports:
      - '8000:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api